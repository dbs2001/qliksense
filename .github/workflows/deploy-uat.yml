name: Deploy changed components to UAT

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "automations/**"
      - "assets/**"

permissions:
  contents: write
  actions: read

concurrency:
  group: deploy-uat
  cancel-in-progress: false

jobs:
  analyze:
    name: Detect and validate changed components
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.validate.outputs.matrix }}
      has_components: ${{ steps.validate.outputs.has_components }}

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Detect changed components
        shell: bash
        run: |
          bash .github/scripts/detect_changed_components.sh \
            "${{ github.event.before }}" \
            "${{ github.sha }}" \
            "${RUNNER_TEMP}/changed-components.json"

      - name: Validate changed components
        id: validate
        shell: bash
        run: |
          bash .github/scripts/validate_components.sh \
            "${{ github.event.before }}" \
            "${RUNNER_TEMP}/changed-components.json" \
            "${RUNNER_TEMP}/validated-components.json"

      - name: Display deployment scope
        shell: bash
        run: |
          echo "Components selected for UAT:"
          jq '.components' "${RUNNER_TEMP}/validated-components.json"

      - name: Upload analysis evidence
        uses: actions/upload-artifact@v4
        with:
          name: component-analysis-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/changed-components.json
            ${{ runner.temp }}/validated-components.json
          if-no-files-found: error
          retention-days: 30

  preserve-artifacts:
    name: Preserve ${{ matrix.component_key }} v${{ matrix.version }}
    needs:
      - analyze

    if: needs.analyze.outputs.has_components == 'true'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.analyze.outputs.matrix) }}

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Prepare native deployment artifacts
        id: prepare
        shell: bash
        env:
          COMPONENT_KEY: ${{ matrix.component_key }}
          COMPONENT_TYPE: ${{ matrix.component_type }}
          COMPONENT_PATH: ${{ matrix.component_path }}
          COMPONENT_VERSION: ${{ matrix.version }}
          ARTIFACTS_JSON: ${{ toJSON(matrix.artifacts) }}
        run: |
          set -euo pipefail

          PACKAGE_NAME="uat-${COMPONENT_KEY}-v${COMPONENT_VERSION}"
          PACKAGE_PATH="prepared/${PACKAGE_NAME}"

          mkdir -p "$PACKAGE_PATH"

          # Preserve component metadata.
          cp "${COMPONENT_PATH}/meta.json" "$PACKAGE_PATH/meta.json"
          cp "${COMPONENT_PATH}/VERSION" "$PACKAGE_PATH/VERSION"

          # Copy native deployable files exactly as declared in meta.json.
          while IFS= read -r ARTIFACT; do
              SOURCE="${COMPONENT_PATH}/${ARTIFACT}"
              TARGET="${PACKAGE_PATH}/${ARTIFACT}"

              mkdir -p "$(dirname "$TARGET")"
              cp "$SOURCE" "$TARGET"
          done < <(jq -r '.[]' <<< "$ARTIFACTS_JSON")

          # Record where this exact artifact came from.
          jq -n \
            --arg component_key "$COMPONENT_KEY" \
            --arg component_type "$COMPONENT_TYPE" \
            --arg component_version "$COMPONENT_VERSION" \
            --arg source_commit "${{ github.sha }}" \
            --arg workflow_run_id "${{ github.run_id }}" \
            --arg target_environment "UAT" \
            --argjson artifacts "$ARTIFACTS_JSON" \
            '{
              component_key: $component_key,
              component_type: $component_type,
              component_version: $component_version,
              source_commit: $source_commit,
              workflow_run_id: $workflow_run_id,
              target_environment: $target_environment,
              artifacts: $artifacts
            }' \
            > "$PACKAGE_PATH/deployment-manifest.json"

          # Checksum the preserved files.
          (
              cd "$PACKAGE_PATH"

              find . \
                -type f \
                ! -name "checksums.sha256" \
                -print0 |
              sort -z |
              xargs -0 sha256sum > checksums.sha256
          )

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_path=$PACKAGE_PATH" >> "$GITHUB_OUTPUT"

          echo "Prepared native artifacts:"
          find "$PACKAGE_PATH" -type f -print

      - name: Upload preserved artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare.outputs.package_name }}
          path: ${{ steps.prepare.outputs.package_path }}
          if-no-files-found: error
          retention-days: 30

  deploy-to-mock-uat:
    name: Deploy preserved artifacts to simulated UAT
    needs:
      - analyze
      - preserve-artifacts

    if: needs.analyze.outputs.has_components == 'true'

    runs-on: ubuntu-latest

    environment:
      name: UAT

    steps:
      - name: Download preserved component artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: uat-*
          path: downloaded-artifacts

      - name: Inspect downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          find downloaded-artifacts -type f -print

      - name: Checkout deployment-state branch
        uses: actions/checkout@v4
        with:
          ref: deployment-state
          fetch-depth: 0
          path: deployment-state

      - name: Copy artifacts to simulated UAT space
        shell: bash
        run: |
          set -euo pipefail

          UAT_ROOT="deployment-state/mock-spaces/UAT"

          mkdir -p "$UAT_ROOT/apps"
          mkdir -p "$UAT_ROOT/automations"
          mkdir -p "$UAT_ROOT/assets"

          for PACKAGE_PATH in downloaded-artifacts/*; do
              [[ -d "$PACKAGE_PATH" ]] || continue

              MANIFEST="$PACKAGE_PATH/deployment-manifest.json"

              if [[ ! -f "$MANIFEST" ]]; then
                  echo "ERROR: Missing manifest in $PACKAGE_PATH"
                  exit 1
              fi

              COMPONENT_KEY="$(jq -r '.component_key' "$MANIFEST")"
              COMPONENT_TYPE="$(jq -r '.component_type' "$MANIFEST")"
              COMPONENT_VERSION="$(jq -r '.component_version' "$MANIFEST")"

              case "$COMPONENT_TYPE" in
                  qlik_app)
                      TARGET_ROOT="$UAT_ROOT/apps"
                      ;;

                  automation)
                      TARGET_ROOT="$UAT_ROOT/automations"
                      ;;

                  asset_bundle)
                      TARGET_ROOT="$UAT_ROOT/assets"
                      ;;

                  *)
                      echo "ERROR: Unsupported component type: $COMPONENT_TYPE"
                      exit 1
                      ;;
              esac

              TARGET_PATH="$TARGET_ROOT/$COMPONENT_KEY"

              echo "Deploying $COMPONENT_KEY v$COMPONENT_VERSION"
              echo "Target: $TARGET_PATH"

              rm -rf "$TARGET_PATH"
              mkdir -p "$TARGET_PATH"

              cp -R "$PACKAGE_PATH"/. "$TARGET_PATH"/
          done

      - name: Record UAT deployment
        shell: bash
        run: |
          set -euo pipefail

          UAT_ROOT="deployment-state/mock-spaces/UAT"

          jq -n \
            --arg environment "UAT" \
            --arg source_commit "${{ github.sha }}" \
            --arg workflow_run_id "${{ github.run_id }}" \
            --arg deployed_at "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            '{
              environment: $environment,
              source_commit: $source_commit,
              workflow_run_id: $workflow_run_id,
              deployed_at: $deployed_at
            }' \
            > "$UAT_ROOT/deployment-summary.json"

      - name: Commit simulated UAT state
        shell: bash
        working-directory: deployment-state
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add mock-spaces/UAT

          if git diff --cached --quiet; then
              echo "No simulated UAT changes to commit."
              exit 0
          fi

          git commit \
            -m "deploy(UAT): run ${{ github.run_id }} from ${{ github.sha }}"

          git push origin deployment-state