name: Test GitHub Environments

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment to test
        required: true
        type: choice
        options:
          - UAT
          - PROD

permissions:
  contents: read

jobs:
  test-environment:
    name: Test ${{ inputs.target_environment }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.target_environment }}

    steps:
      - name: Display environment configuration
        shell: bash
        run: |
          echo "Environment: ${{ vars.TARGET_ENVIRONMENT }}"
          echo "Mock space path: ${{ vars.MOCK_SPACE_PATH }}"
          echo "Commit: $GITHUB_SHA"