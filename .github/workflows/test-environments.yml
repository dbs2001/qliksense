name: Test GitHub environments
on:
  workflow_dispatch:
    inputs:
      target:
        description: Environment to test
        required: true
        type: choice
        options: [UAT, PROD]
permissions: {contents: read}
jobs:
  test:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    steps:
      - run: echo "Environment '${{ inputs.target }}' is configured and accessible."
