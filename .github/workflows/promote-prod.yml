name: Promote approved component prerelease to PROD
run-name: Promote ${{ inputs.uat_prerelease_tag }} to PROD
on:
  workflow_dispatch:
    inputs:
      uat_prerelease_tag:
        description: "Approved prerelease tag, e.g. app1-v1.0.1-rc.1"
        required: true
        type: string
permissions: {contents: write}
concurrency:
  group: prod-promotion
  cancel-in-progress: false
jobs:
  promote:
    runs-on: ubuntu-latest
    environment: PROD
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0, fetch-tags: true}
      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Download approved UAT prerelease
        env: {GH_TOKEN: "${{ github.token }}", UAT_TAG: "${{ inputs.uat_prerelease_tag }}"}
        run: mkdir -p uat-release && gh release download "$UAT_TAG" --dir uat-release
      - run: bash .github/scripts/verify_component_release_assets.sh uat-release
      - name: Simulate Qlik PROD deployment
        run: |
          manifest="uat-release/component-manifest.json"; component_type="$(jq -r '.component_type' "$manifest")"; component_key="$(jq -r '.component_key' "$manifest")"
          while IFS= read -r asset_name; do bash .github/scripts/qlik_deploy_adapter.sh PROD "$component_type" "$component_key" "uat-release/$asset_name"; done < <(jq -r '.artifacts[].release_asset_name' "$manifest")
      - run: bash .github/scripts/create_stable_tag.sh uat-release/component-manifest.json
      - name: Create production release
        env: {GH_TOKEN: "${{ github.token }}"}
        run: |
          manifest="uat-release/component-manifest.json"; stable_tag="$(jq -r '.stable_tag' "$manifest")"; prerelease_tag="$(jq -r '.prerelease_tag' "$manifest")"; display_name="$(jq -r '.display_name' "$manifest")"; base_version="$(jq -r '.base_version' "$manifest")"; component_key="$(jq -r '.component_key' "$manifest")"
          jq -n --arg component_key "$component_key" --arg environment PROD --arg status success --arg prerelease_tag "$prerelease_tag" --arg stable_tag "$stable_tag" --arg promoted_by "${{ github.actor }}" --arg promoted_at "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" '{component_key:$component_key,environment:$environment,status:$status,prerelease_tag:$prerelease_tag,stable_tag:$stable_tag,promoted_by:$promoted_by,promoted_at:$promoted_at}' > promotion-receipt.json
          { echo "# ${display_name} v${base_version}"; echo; echo "## Production promotion"; echo; echo "- Source UAT prerelease: \`${prerelease_tag}\`"; echo "- Stable tag: \`${stable_tag}\`"; echo "- Promoted by: \`${{ github.actor }}\`"; if [[ -f uat-release/CHANGELOG.md ]]; then echo; echo "## Changelog"; echo; cat uat-release/CHANGELOG.md; fi; } > prod-release-notes.md
          assets=(promotion-receipt.json "$manifest"); [[ ! -f uat-release/CHANGELOG.md ]] || assets+=(uat-release/CHANGELOG.md)
          gh release create "$stable_tag" --verify-tag --title "${display_name} v${base_version}" --notes-file prod-release-notes.md "${assets[@]}"
