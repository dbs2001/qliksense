name: Promote approved UAT release to PROD

run-name: Promote ${{ inputs.uat_deployment_tag }} to PROD

on:
  workflow_dispatch:
    inputs:
      uat_deployment_tag:
        description: "Published UAT release tag, e.g. uat-deploy/run-123456"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: prod-promotion
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: PROD

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download approved UAT release assets
        env:
          GH_TOKEN: ${{ github.token }}
          UAT_TAG: ${{ inputs.uat_deployment_tag }}
        run: |
          mkdir -p uat-release
          gh release download "$UAT_TAG" \
            --dir uat-release

      - name: Verify UAT release assets
        run: |
          bash .github/scripts/verify_release_assets.sh \
            uat-release

      - name: Simulate Qlik PROD deployment
        run: |
          set -euo pipefail

          while IFS= read -r component; do
            component_type="$(jq -r '.component_type' <<< "$component")"
            component_key="$(jq -r '.component_key' <<< "$component")"

            while IFS= read -r asset_name; do
              bash .github/scripts/qlik_deploy_adapter.sh \
                "PROD" \
                "$component_type" \
                "$component_key" \
                "uat-release/$asset_name"
            done < <(jq -r '.artifacts[].release_asset_name' <<< "$component")
          done < <(jq -c '.components[]' uat-release/deployment-manifest.json)

      - name: Create stable component tags
        run: |
          bash .github/scripts/create_stable_tags.sh \
            uat-release/deployment-manifest.json

      - name: Create production promotion receipt
        run: |
          jq -n \
            --arg production_deployment_id "prod-${{ github.run_id }}" \
            --arg environment "PROD" \
            --arg status "success" \
            --arg uat_deployment_tag "${{ inputs.uat_deployment_tag }}" \
            --arg workflow_run_id "${{ github.run_id }}" \
            --arg promoted_by "${{ github.actor }}" \
            --arg promoted_at "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --slurpfile manifest uat-release/deployment-manifest.json \
            '{
              production_deployment_id: $production_deployment_id,
              environment: $environment,
              status: $status,
              uat_deployment_tag: $uat_deployment_tag,
              workflow_run_id: $workflow_run_id,
              promoted_by: $promoted_by,
              promoted_at: $promoted_at,
              components: [
                $manifest[0].components[] |
                {
                  component_key,
                  prerelease_tag,
                  stable_tag,
                  source_commit,
                  artifacts
                }
              ]
            }' > promotion-receipt.json

      - name: Publish GitHub PROD release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          prod_tag="prod-deploy/run-${{ github.run_id }}"
          source_commit="$(jq -r '.source_commit' uat-release/deployment-manifest.json)"

          {
            echo "# Production deployment ${{ github.run_id }}"
            echo
            echo "- Source UAT release: \`${{ inputs.uat_deployment_tag }}\`"
            echo "- Promoted by: \`${{ github.actor }}\`"
            echo
            echo "## Components"
            jq -r '.components[] |
              "- `\(.stable_tag)` from `\(.prerelease_tag)`"' \
              uat-release/deployment-manifest.json
          } > prod-release-notes.md

          gh release create "$prod_tag" \
            --target "$source_commit" \
            --title "Production deployment ${{ github.run_id }}" \
            --notes-file prod-release-notes.md \
            promotion-receipt.json \
            uat-release/deployment-manifest.json
