name: Deploy component prereleases to UAT
on:
  push:
    branches: [main]
    paths: ["apps/**", "automations/**", "assets/**"]
permissions: {contents: write, actions: read}
concurrency:
  group: uat-prerelease-planning
  cancel-in-progress: false
jobs:
  analyze-and-plan:
    runs-on: ubuntu-latest
    outputs:
      has_components: ${{ steps.plan.outputs.has_components }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with: {ref: "${{ github.sha }}", fetch-depth: 0, fetch-tags: true}
      - run: bash .github/scripts/detect_changed_components.sh "${{ github.event.before }}" "${{ github.sha }}" "${RUNNER_TEMP}/changed-components.json"
      - run: bash .github/scripts/validate_components.sh "${RUNNER_TEMP}/changed-components.json" "${RUNNER_TEMP}/validated-components.json"
      - id: plan
        run: bash .github/scripts/plan_prerelease_versions.sh "${RUNNER_TEMP}/changed-components.json" "${RUNNER_TEMP}/validated-components.json" "${RUNNER_TEMP}/prerelease-plan.json"
  prepare-candidates:
    needs: analyze-and-plan
    if: needs.analyze-and-plan.outputs.has_components == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.analyze-and-plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with: {ref: "${{ github.sha }}"}
      - id: prepare
        env: {COMPONENT_JSON: "${{ toJSON(matrix) }}"}
        run: |
          candidate_name="$(bash .github/scripts/prepare_component_candidate.sh "$COMPONENT_JSON" "${{ github.sha }}" "${RUNNER_TEMP}/prepared")"
          candidate_dir="${RUNNER_TEMP}/prepared/${candidate_name}"
          bash .github/scripts/generate_payload_checksums.sh "$candidate_dir"
          echo "candidate_name=$candidate_name" >> "$GITHUB_OUTPUT"
          echo "candidate_dir=$candidate_dir" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with: {name: "${{ steps.prepare.outputs.candidate_name }}", path: "${{ steps.prepare.outputs.candidate_dir }}", retention-days: 14}
  deploy-and-publish:
    needs: [analyze-and-plan, prepare-candidates]
    if: needs.analyze-and-plan.outputs.has_components == 'true'
    runs-on: ubuntu-latest
    environment: UAT
    steps:
      - uses: actions/checkout@v4
        with: {ref: "${{ github.sha }}", fetch-depth: 0, fetch-tags: true}
      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - uses: actions/download-artifact@v4
        with: {pattern: "prepared-*", path: prepared}
      - name: Verify, deploy, tag and publish each component
        env: {GH_TOKEN: "${{ github.token }}"}
        run: |
          set -euo pipefail
          for candidate_dir in prepared/*; do
            [[ -d "$candidate_dir" ]] || continue
            bash .github/scripts/verify_prepared_candidate.sh "$candidate_dir"
            manifest="$candidate_dir/component-manifest.json"
            component_type="$(jq -r '.component_type' "$manifest")"; component_key="$(jq -r '.component_key' "$manifest")"; display_name="$(jq -r '.display_name' "$manifest")"; base_version="$(jq -r '.base_version' "$manifest")"; rc_number="$(jq -r '.rc_number' "$manifest")"; prerelease_tag="$(jq -r '.prerelease_tag' "$manifest")"
            while IFS= read -r asset_name; do bash .github/scripts/qlik_deploy_adapter.sh UAT "$component_type" "$component_key" "$candidate_dir/payload/$asset_name"; done < <(jq -r '.artifacts[].release_asset_name' "$manifest")
            bash .github/scripts/create_prerelease_tag.sh "$manifest"
            jq -n --arg component_key "$component_key" --arg environment UAT --arg status success --arg prerelease_tag "$prerelease_tag" --arg source_commit "${{ github.sha }}" --arg workflow_run_id "${{ github.run_id }}" --arg deployed_at "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" '{component_key:$component_key,environment:$environment,status:$status,prerelease_tag:$prerelease_tag,source_commit:$source_commit,workflow_run_id:$workflow_run_id,deployed_at:$deployed_at}' > "$candidate_dir/deployment-receipt.json"
            { echo "# ${display_name} v${base_version} RC${rc_number}"; echo; echo "## UAT deployment"; echo; echo "- Tag: \`${prerelease_tag}\`"; echo "- Source commit: \`${{ github.sha }}\`"; echo "- Workflow run: \`${{ github.run_id }}\`"; if [[ -f "$candidate_dir/CHANGELOG.md" ]]; then echo; echo "## Changelog"; echo; cat "$candidate_dir/CHANGELOG.md"; fi; } > "$candidate_dir/release-notes.md"
            release_assets=("$candidate_dir/component-manifest.json" "$candidate_dir/meta.json" "$candidate_dir/payload-checksums.sha256" "$candidate_dir/deployment-receipt.json")
            [[ ! -f "$candidate_dir/CHANGELOG.md" ]] || release_assets+=("$candidate_dir/CHANGELOG.md")
            while IFS= read -r asset_name; do release_assets+=("$candidate_dir/payload/$asset_name"); done < <(jq -r '.artifacts[].release_asset_name' "$manifest")
            gh release create "$prerelease_tag" --verify-tag --title "${display_name} v${base_version} RC${rc_number}" --notes-file "$candidate_dir/release-notes.md" --prerelease "${release_assets[@]}"
          done
