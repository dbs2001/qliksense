name: Validate changed components

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "apps/**"
      - "automations/**"
      - "assets/**"
      - ".github/scripts/detect_changed_components.sh"
      - ".github/scripts/validate_components.sh"
      - ".github/workflows/validate-components.yml"

permissions:
  contents: read

concurrency:
  group: validate-components-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-and-validate:
    name: Detect and validate changed components
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Detect changed components
        shell: bash
        run: |
          bash .github/scripts/detect_changed_components.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "${RUNNER_TEMP}/changed-components.json"

      - name: Validate changed components
        shell: bash
        run: |
          bash .github/scripts/validate_components.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${RUNNER_TEMP}/changed-components.json" \
            "${RUNNER_TEMP}/validated-components.json"

      - name: Display validation result
        shell: bash
        run: |
          echo "Changed components:"
          jq . "${RUNNER_TEMP}/changed-components.json"

          echo "Validated components:"
          jq . "${RUNNER_TEMP}/validated-components.json"

      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: component-validation-pr-${{ github.event.pull_request.number }}
          path: |
            ${{ runner.temp }}/changed-components.json
            ${{ runner.temp }}/validated-components.json
          if-no-files-found: error
          retention-days: 14